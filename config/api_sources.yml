# API ingestion config (Open Food Facts product catalogue).
sources:
  off_products:
    base_url: https://world.openfoodfacts.org/api/v2/search
    page_size: 100             # OFF max per page
    max_pages: 5               # cap per run (500 products)
    rate_limit_seconds: 2.0    # the free API throttles, don't hammer it
    # sorted newest-first; the extractor pages until it crosses the watermark
    sort_by: last_modified_t
    watermark_field: last_modified_t
    fields:
      - code
      - product_name
      - brands
      - categories_tags
      - countries_tags
      - nutriments
      - last_modified_t
    # lands under the existing raw/ prefix so the same storage integration,
    # IAM policy and stage cover it
    s3_prefix: raw/off_products_api      # s3://<bucket>/raw/off_products_api/dt=.../
    raw_table: off_products_raw          # Snowflake raw.<raw_table> (VARIANT)
