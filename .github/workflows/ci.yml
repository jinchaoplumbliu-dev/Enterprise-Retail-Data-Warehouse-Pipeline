name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: pytest -v

  dbt-parse:
    # validates the dbt project (refs, macros, schema files) without a warehouse
    runs-on: ubuntu-latest
    env:
      SNOWFLAKE_ACCOUNT: ci-placeholder
      SNOWFLAKE_USER: ci
      SNOWFLAKE_PASSWORD: ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dbt.txt
      - run: dbt deps --project-dir dbt/instacart --profiles-dir dbt/instacart
      - run: dbt parse --project-dir dbt/instacart --profiles-dir dbt/instacart
