# Astro mounts dags/ and include/ by default, but our supporting code lives at
# the project root. Mount it explicitly so the BashOperator tasks can see it,
# and mount the host AWS dir so boto3 in the container can use the SSO session
# (run `aws sso login --profile instacart` on the host first).
services:
  scheduler:
    volumes:
      - ./src:/usr/local/airflow/src
      - ./config:/usr/local/airflow/config
      - ./dbt:/usr/local/airflow/dbt
      - ./data:/usr/local/airflow/data
      # mount to the astro user's HOME so boto3 finds ~/.aws/config + sso cache
      - type: bind
        source: ${USERPROFILE}/.aws
        target: /home/astro/.aws
        read_only: true
